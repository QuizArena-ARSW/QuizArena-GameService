<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QuizArena · Cliente de prueba (Fase 1)</title>
<style>
  body { font-family: system-ui, Arial, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; color: #1e1b2e; }
  h1 { color: #4C1D95; }
  .panel { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  button { background: #7C3AED; color: #fff; border: 0; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: 14px; }
  button:hover { background: #6D28D9; }
  input { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
  .opcion { display: block; width: 100%; text-align: left; background: #F1F5F9; color: #1e1b2e; margin: 6px 0; }
  .opcion:hover { background: #DDD6FE; }
  #log { font-family: monospace; font-size: 12px; background: #1e1b2e; color: #a5f3fc; padding: 12px; border-radius: 8px; height: 160px; overflow-y: auto; white-space: pre-wrap; }
  .marcador li { margin: 4px 0; }
  .pill { background:#06B6D4; color:#fff; border-radius: 20px; padding: 2px 10px; font-size: 12px; }
</style>
<!-- Librerias de cliente STOMP sobre SockJS -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
  <h1>QuizArena · Cliente de prueba</h1>
  <p>Sirve para probar el tiempo real de la Fase 1 sin el frontend de React. Abre <b>esta misma página en 2 o 3 pestañas</b> para simular varios jugadores.</p>

  <div class="panel">
    <h3>0. Cuenta (login en Identidad)</h3>
    <input id="correo" placeholder="correo" value="juan@mail.com">
    <input id="password" type="password" placeholder="contraseña" value="secreta123">
    <button onclick="login()">Login</button>
    <span id="loginEstado" style="margin-left:10px;font-weight:600"></span>
  </div>

  <div class="panel">
    <h3>1. Sala</h3>
    <input id="idBanco" placeholder="id del banco (de Identidad)" style="width:280px">
    <button onclick="crearSalaReal()">Crear sala con banco real</button>
    <button onclick="crearSala()">Crear sala demo</button>
    <br><br>
    <input id="codigo" placeholder="CÓDIGO" style="text-transform:uppercase">
    <input id="apodo" placeholder="Tu apodo">
    <button onclick="conectar()">Unirme</button>
    <button onclick="iniciar()">Iniciar partida (anfitrión)</button>
  </div>

  <div class="panel">
    <h3>2. Jugadores <span id="estado" class="pill">desconectado</span></h3>
    <ul id="jugadores"></ul>
  </div>

  <div class="panel" id="panelPregunta" style="display:none">
    <h3 id="ronda"></h3>
    <p id="enunciado" style="font-size:18px;font-weight:600"></p>
    <div id="opciones"></div>
    <button onclick="siguiente()">Siguiente pregunta ▶</button>
  </div>

  <div class="panel">
    <h3>Marcador</h3>
    <ol id="marcador" class="marcador"></ol>
  </div>

  <div class="panel">
    <h3>Log</h3>
    <div id="log"></div>
  </div>

<script>
const BASE = "http://localhost:8081";
const IDENTIDAD = "http://localhost:8082";
let miIdUsuario = null;
let stomp = null;
let codigoSala = null;
let miId = null;
let miApodo = null;
let tInicioPregunta = 0;

function log(msg) {
  const el = document.getElementById("log");
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}

// Decodifica el payload de un JWT (base64url) para leer sus datos
function decodeJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  const json = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
  return JSON.parse(json);
}

// Login contra el Servicio de Identidad para obtener el idUsuario real
async function login() {
  const correo = document.getElementById("correo").value.trim();
  const password = document.getElementById("password").value;
  try {
    const r = await fetch(IDENTIDAD + "/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ correo: correo, contrasena: password })
    });
    const data = await r.json();
    if (!data.token) { log("Error de login: " + JSON.stringify(data)); return; }
    const payload = decodeJwt(data.token);
    miIdUsuario = payload.sub;   // el "sub" del token es el idUsuario
    document.getElementById("loginEstado").textContent =
      "✓ " + data.nombre + " (id " + miIdUsuario.substring(0, 8) + "...)";
    log("Login OK. idUsuario: " + miIdUsuario);
  } catch (e) {
    log("Error de login: " + e.message);
  }
}

// Crea una sala DEMO (preguntas quemadas, no depende de Identidad)
async function crearSala() {
  const r = await fetch(BASE + "/api/salas/demo", { method: "POST" });
  const data = await r.json();
  document.getElementById("codigo").value = data.codigo;
  log("Sala DEMO creada: " + data.codigo + " (" + data.totalRondas + " rondas)");
}

// Crea una sala REAL: pide las preguntas del banco al Servicio de Identidad
async function crearSalaReal() {
  const idBanco = document.getElementById("idBanco").value.trim();
  if (!idBanco) { alert("Pega el id del banco que creaste en Identidad"); return; }
  const r = await fetch(BASE + "/api/salas", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ idBanco: idBanco })
  });
  const data = await r.json();
  if (data.error) { log("ERROR: " + data.error); alert(data.error); return; }
  document.getElementById("codigo").value = data.codigo;
  log("Sala REAL creada: " + data.codigo + " (" + data.totalRondas + " rondas del banco)");
}

function conectar() {
  codigoSala = document.getElementById("codigo").value.toUpperCase().trim();
  miApodo = document.getElementById("apodo").value.trim() || "Jugador";
  if (!codigoSala) { alert("Pon un código de sala"); return; }
  if (!miIdUsuario) { alert("Primero haz login (paso 0) para tener una cuenta"); return; }

  const socket = new SockJS(BASE + "/ws-juego");
  stomp = Stomp.over(socket);
  stomp.debug = null; // silencia el log interno

  stomp.connect({}, () => {
    document.getElementById("estado").textContent = "conectado";
    log("Conectado al WebSocket");

    // Canal de la sala: aquí llega todo (lista, preguntas, marcador, fin)
    stomp.subscribe("/topic/sala/" + codigoSala, (msg) => manejarEvento(JSON.parse(msg.body)));

    // Canal personal: aquí me llega MI id de jugador al unirme
    stomp.subscribe("/topic/sala/" + codigoSala + "/jugador/" + miApodo, (msg) => {
      miId = msg.body;
      log("Soy el jugador con id: " + miId);
    });

    // Envío la solicitud de unirme, incluyendo mi idUsuario real
    stomp.send("/app/sala/" + codigoSala + "/unirse", {},
      JSON.stringify({ apodo: miApodo, idUsuario: miIdUsuario }));
  });
}

function iniciar() {
  if (!stomp) return;
  stomp.send("/app/sala/" + codigoSala + "/iniciar", {}, "");
}

function siguiente() {
  if (!stomp) return;
  stomp.send("/app/sala/" + codigoSala + "/siguiente", {}, "");
}

function responder(idOpcion) {
  const tiempoMs = Date.now() - tInicioPregunta;
  stomp.send("/app/sala/" + codigoSala + "/responder", {}, JSON.stringify({
    idJugador: miId, idOpcion: idOpcion, tiempoRespuestaMs: tiempoMs
  }));
  log("Respondí (tardé " + tiempoMs + " ms)");
}

function manejarEvento(ev) {
  switch (ev.tipo) {
    case "JUGADORES": pintarJugadores(ev.jugadores); break;
    case "PREGUNTA":  pintarPregunta(ev); break;
    case "MARCADOR":  pintarMarcador(ev.ranking); break;
    case "FIN":       log("=== FIN DE LA PARTIDA ==="); pintarMarcador(ev.rankingFinal); break;
  }
}

function pintarJugadores(jugadores) {
  document.getElementById("jugadores").innerHTML =
    jugadores.map(j => "<li>" + j.apodo + "</li>").join("");
}

function pintarPregunta(ev) {
  document.getElementById("panelPregunta").style.display = "block";
  document.getElementById("ronda").textContent = "Ronda " + ev.ronda + " de " + ev.totalRondas;
  document.getElementById("enunciado").textContent = ev.enunciado;
  document.getElementById("opciones").innerHTML =
    ev.opciones.map(o => '<button class="opcion" onclick="responder(\'' + o.id + '\')">' + o.texto + '</button>').join("");
  tInicioPregunta = Date.now();
  log("Llegó pregunta: " + ev.enunciado);
}

function pintarMarcador(ranking) {
  document.getElementById("marcador").innerHTML =
    ranking.map(j => "<li>" + j.apodo + " — <b>" + j.puntaje + "</b> pts</li>").join("");
}
</script>
</body>
</html>

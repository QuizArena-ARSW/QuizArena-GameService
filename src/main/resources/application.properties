# ==========================================================
# QuizArena - Servicio de Juego
#
# TODA la configuracion que cambia entre entornos se lee de VARIABLES DE
# ENTORNO, con un valor por defecto para desarrollo local.
#
# Formato:  ${VARIABLE:valor_por_defecto}
#
# Asi la MISMA imagen de Docker funciona en local y en Azure: solo cambian
# las variables. Nunca se recompila para cambiar de entorno.
# ==========================================================
spring.application.name=servicio-juego

# En Azure Container Apps el puerto lo inyecta la plataforma
server.port=${PORT:8081}

# ---- Servicio de Identidad ----
quizarena.identidad.url=${SERVICIO_IDENTIDAD_URL:http://localhost:8082}

# ---- Base de datos ----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/juego_db}
spring.datasource.username=${DB_USER:quizarena}
spring.datasource.password=${DB_PASSWORD:quizarena123}

# ---- Redis (estado compartido) ----
# En Azure Cache for Redis: SSL activado y con contrasena
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=5s

# ---- CORS del WebSocket ----
# El WebSocket se conecta DIRECTO a este servicio (no pasa por el Gateway),
# asi que necesita saber desde que origen se le permite conectar.
quizarena.cors.origenes=${CORS_ORIGENES:*}

# ---- JWT (para saber quien crea/invita a una sala) ----
# Mismo secreto compartido que Identidad y el Gateway. Sin valor por defecto
# a proposito: si falta la variable de entorno, la app debe fallar al
# arrancar en vez de validar tokens con una clave publica en el repositorio.
quizarena.jwt.secret=${JWT_SECRET}

# ---- Observabilidad ----
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.aplicacion=quizarena-juego
management.metrics.tags.instancia=${INSTANCIA:local}

logging.level.com.quizarena.juego=INFO

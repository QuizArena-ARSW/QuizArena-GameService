# ==========================================================
# QuizArena - Servicio de Juego - Configuracion
# ==========================================================
spring.application.name=servicio-juego

# El puerto se puede sobreescribir al arrancar para lanzar VARIAS INSTANCIAS:
#   mvn spring-boot:run "-Dspring-boot.run.arguments=--server.port=8091"
server.port=8081

# ---- Conexion al Servicio de Identidad ----
quizarena.identidad.url=http://localhost:8082

# ---- FASE 5: Redis (estado compartido entre instancias) ----
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---- FASE 5: Observabilidad (Actuator + Prometheus) ----
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.aplicacion=quizarena-juego
# Etiqueta cada metrica con la instancia (util al escalar)
management.metrics.tags.instancia=${INSTANCIA:local}

# ---- Logs ----
logging.level.com.quizarena.juego=INFO
